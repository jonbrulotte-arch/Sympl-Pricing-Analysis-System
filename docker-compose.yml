services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sympl
      POSTGRES_PASSWORD: symplpass
      POSTGRES_DB: sympl_pas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sympl -d sympl_pas"]
      interval: 5s
      timeout: 5s
      retries: 5

  db_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sympl
      POSTGRES_PASSWORD: symplpass
      POSTGRES_DB: sympl_pas_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sympl -d sympl_pas_test"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
